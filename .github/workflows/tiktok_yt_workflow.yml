name: TikTok → YouTube Shorts (BOLTAS CLIPS)

on:
  schedule:
    - cron: "30 8 * * *"    # 02:00 PM IST
    - cron: "30 15 * * *"   # 09:00 PM IST
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install FFmpeg & Fonts
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: Cache Playwright Chromium
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-v1

      - name: Install Playwright + Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: |
          playwright install chromium

      - name: Install Playwright system deps
        run: playwright install-deps chromium

      - name: Run BOLTAS CLIPS uploader
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 25
          max_attempts: 3
          retry_on: error
          command: python yt_playwright_upload.py
        env:
          TIKTOK_PROFILE_ID: ${{ secrets.TIKTOK_PROFILE_ID }}
          YT_COOKIES_B64:    ${{ secrets.YT_COOKIES_B64 }}
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          WATERMARK_TEXT:    ${{ secrets.WATERMARK_TEXT || '@BOLTAS CLIPS' }}
          YT_PRIVACY:        public
          YT_CATEGORY:       "24"
          CRON_SCHEDULE:     ${{ github.event.schedule }}

      - name: Commit & Push history
        run: |
          git checkout main
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for i in {1..10}; do
            echo "Attempt $i..."
            git pull --rebase --autostash origin main

            git add upload_history_ch2.txt hash_history_ch2.txt temp_work_ch2/downloaded_ch2.txt 2>/dev/null || true

            if git diff --cached --quiet; then
              echo "No changes to commit."
              exit 0
            fi

            git commit -m "Update BOLTAS CLIPS history [skip ci]"

            if git push origin main; then
              echo "Push successful!"
              exit 0
            else
              echo "Push failed. Retrying in 5s..."
              git reset HEAD~1
              sleep 5
            fi
          done
          echo "Failed after 10 attempts."
          exit 1
