name: TikTok → YouTube Shorts

on:
  schedule:
    - cron: "00 0 * * *"
    - cron: "00 6 * * *"
    - cron: "00 12 * * *"
    - cron: "00 18 * * *"
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: Run uploader
        env:
          SEARCH_KEYWORDS:     ${{ secrets.SEARCH_KEYWORDS }}
          CLIENT_SECRETS_JSON: ${{ secrets.CLIENT_SECRETS_JSON }}
          TOKEN_PICKLE_B64:    ${{ secrets.TOKEN_PICKLE_B64 }}
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          DRIVE_FOLDER_URL:    ${{ secrets.DRIVE_FOLDER_URL }}
          WATERMARK_TEXT:      ${{ secrets.WATERMARK_TEXT || '@VIRALITY' }}
          YT_PRIVACY:          public
          YT_CATEGORY:         "24"
        run: python tiktok_to_youtube.py

      - name: Robust Commit & Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add upload_history.txt hash_history.txt || true
          if git commit -m "Update upload history [skip ci]"; then
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes to commit"
          fi
