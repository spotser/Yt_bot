name: TikTok → YouTube Shorts (Channel 2)

on:
  schedule:
    - cron: "30 11 * * *"    # 05:00 PM IST
    - cron: "30 14 * * *"    # 08:00 PM IST
  workflow_dispatch:         # Manual run button

jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # Necessary to push history update
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Install FFmpeg & Fonts
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: Run uploader
        env:
          CLIENT_SECRETS_JSON: ${{ secrets.CLIENT_SECRETS_JSON }}
          TOKEN_PICKLE_B64:    ${{ secrets.TOKEN_PICKLE_B64_CH2 }}
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          WATERMARK_TEXT:      ${{ secrets.WATERMARK_TEXT_CH2 || '@VIRALITY' }}
          TIKTOK_PROFILE_ID:   ${{ secrets.TIKTOK_PROFILE_ID }}
          YT_PRIVACY:          public
          YT_CATEGORY:         "24"
        run: python tiktok_to_youtube_ch2.py

      - name: Commit & Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update upload history CH2 [skip ci]"
          file_pattern: 'upload_history_ch2.txt hash_history_ch2.txt'
          skip_dirty_check: true
