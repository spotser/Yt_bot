name: TikTok → YouTube Shorts (BOLTAS CLIPS)

on:
  schedule:
    - cron: "30 8 * * *"    # 02:00 PM IST (Indian Mid-Day Peak Time)
    - cron: "30 15 * * *"   # 09:00 PM IST (Indian Evening Peak Time)
  workflow_dispatch:         # Manual run button

jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # Necessary to push history update
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Install FFmpeg & Fonts
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: Run uploader with Retry
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 20
          max_attempts: 3
          retry_on: error
          command: python tiktok_to_youtube_ch2.py
        env:
          TIKTOK_PROFILE_ID:   ${{ secrets.TIKTOK_PROFILE_ID }}
          CLIENT_SECRETS_JSON: ${{ secrets.CLIENT_SECRETS_JSON }}
          TOKEN_PICKLE_B64_CH2: ${{ secrets.TOKEN_PICKLE_B64_CH2 }}
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          WATERMARK_TEXT_CH2:  ${{ secrets.WATERMARK_TEXT_CH2 || '@BOLTAS CLIPS' }}
          YT_PRIVACY:          public
          YT_CATEGORY:         "24"
          CRON_SCHEDULE:       ${{ github.event.schedule }}

      - name: Commit & Push changes with Rebase Loop
        run: |
          git checkout main
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          for i in {1..10}; do
            echo "Attempt $i to commit and push changes..."
            git pull --rebase --autostash origin main
            
            git add upload_history_ch2.txt hash_history_ch2.txt temp_work_ch2/downloaded_ch2.txt 2>/dev/null || true
            
            if git diff --cached --quiet; then
              echo "No changes to commit."
              exit 0
            fi
            
            git commit -m "Update upload history channel 2 [skip ci]"
            
            if git push origin main; then
              echo "Push successful!"
              exit 0
            else
              echo "Push rejected! Remote changed. Retrying in 5 seconds..."
              git reset HEAD~1
              sleep 5
            fi
          done
          echo "Failed to commit and push after 10 attempts."
          exit 1
