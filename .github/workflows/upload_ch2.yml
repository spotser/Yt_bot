name: TikTok → YouTube Shorts (Channel 2)

on:
  schedule:
    - cron: "30 11 * * *"    # 05:00 PM IST
    - cron: "30 14 * * *"    # 08:00 PM IST
  workflow_dispatch:         # Manual run button

concurrency:
  group: yt-upload
  cancel-in-progress: false

jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: Run uploader
        env:
          CLIENT_SECRETS_JSON: ${{ secrets.CLIENT_SECRETS_JSON }}
          TOKEN_PICKLE_B64:    ${{ secrets.TOKEN_PICKLE_B64_CH2 }}
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          WATERMARK_TEXT:      ${{ secrets.WATERMARK_TEXT_CH2 || '@VIRALITY' }}
          TIKTOK_PROFILE_ID:   ${{ secrets.TIKTOK_PROFILE_ID }}
          YT_PRIVACY:          public
          YT_CATEGORY:         "24"
        run: python tiktok_to_youtube_ch2.py

      - name: Robust Commit & Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. Stage and commit history
          git add upload_history_ch2.txt hash_history_ch2.txt || true
          git commit -m "Update CH2 history [skip ci]" || echo "No changes to commit"
          
          # 2. Stash any remaining unstaged changes to allow rebase
          git stash push --include-untracked || true
          
          # 3. Pull latest with rebase
          git pull --rebase origin main
          
          # 4. Final push
          git push origin main
