name: TikTok → YouTube Shorts

on:
  schedule:
    - cron: "00 0 * * *"    # 05:30 AM IST (CH1)
    - cron: "00 6 * * *"    # 11:30 AM IST (CH1)
    - cron: "00 8 * * *"    # 01:30 PM IST (CH2 PEAK 1)
    - cron: "00 12 * * *"   # 05:30 PM IST (CH1)
    - cron: "00 15 * * *"   # 08:30 PM IST (CH2 PEAK 2)
    - cron: "00 18 * * *"   # 11:30 PM IST (CH1)
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # Necessary to push history update
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Install FFmpeg & Fonts
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: Run Channel #1 (4x Daily)
        env:
          SEARCH_KEYWORDS:     ${{ secrets.SEARCH_KEYWORDS }}
          CLIENT_SECRETS_JSON: ${{ secrets.CLIENT_SECRETS_JSON }}
          TOKEN_PICKLE_B64:    ${{ secrets.TOKEN_PICKLE_B64 }}
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          SYSTEM_LICENSE_KEY:  ${{ secrets.SYSTEM_LICENSE_KEY }}
          WATERMARK_TEXT:      ${{ secrets.WATERMARK_TEXT || '@VIRALITY' }}
          YT_PRIVACY:          public
          YT_CATEGORY:         "24"
        run: python tiktok_to_youtube.py

      - name: Run Channel #2 (India Peak: 1:30 PM & 8:30 PM)
        if: github.event.schedule == '00 8 * * *' || github.event.schedule == '00 15 * * *' || github.event_name == 'workflow_dispatch'
        env:
          TIKTOK_PROFILE_ID:   ${{ secrets.TIKTOK_PROFILE_ID }}
          CLIENT_SECRETS_JSON: ${{ secrets.CLIENT_SECRETS_JSON }}
          TOKEN_PICKLE_B64_CH2: ${{ secrets.TOKEN_PICKLE_B64_CH2 }}
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          SYSTEM_LICENSE_KEY:  ${{ secrets.SYSTEM_LICENSE_KEY }}
          WATERMARK_TEXT_CH2:  ${{ secrets.WATERMARK_TEXT_CH2 || '@AURA_PRO' }}
          YT_PRIVACY:          public
          YT_CATEGORY:         "24"
        run: python tiktok_profile_to_youtube.py

      - name: Commit & Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update upload history [skip ci]"
          file_pattern: 'upload_history.txt hash_history.txt upload_history_ch2.txt hash_history_ch2.txt'
