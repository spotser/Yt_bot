name: TikTok → YouTube Shorts (BOLTAS CLIPS)

on:
  schedule:
    - cron: "30 8 * * *"    # 02:00 PM IST (Indian Mid-Day Peak Time)
    - cron: "30 15 * * *"   # 09:00 PM IST (Indian Evening Peak Time)
  workflow_dispatch:         # Manual run button

jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # Necessary to push history update
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Install FFmpeg & Fonts
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: Run uploader with Retry
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 20
          max_attempts: 3
          retry_on: error
          command: python tiktok_to_youtube_ch2.py
        env:
          TIKTOK_PROFILE_ID:   ${{ secrets.TIKTOK_PROFILE_ID }}
          CLIENT_SECRETS_JSON: ${{ secrets.CLIENT_SECRETS_JSON }}
          TOKEN_PICKLE_B64_CH2: ${{ secrets.TOKEN_PICKLE_B64_CH2 }}
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          WATERMARK_TEXT_CH2:  ${{ secrets.WATERMARK_TEXT_CH2 || '@BOLTAS CLIPS' }}
          YT_PRIVACY:          public
          YT_CATEGORY:         "24"
          CRON_SCHEDULE:       ${{ github.event.schedule }}

      - name: Commit & Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update upload history channel 2 [skip ci]"
          file_pattern: 'upload_history_ch2.txt hash_history_ch2.txt temp_work_ch2/downloaded_ch2.txt'
