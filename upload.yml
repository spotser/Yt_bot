name: TikTok → YouTube Shorts

on:
  schedule:
    - cron: "35 8 * * *"    # 2:05 PM IST
    - cron: "45 10 * * *"   # 4:15 PM IST
    - cron: "10 13 * * *"   # 6:40 PM IST
    - cron: "20 15 * * *"   # 8:50 PM IST
    - cron: "45 16 * * *"   # 10:15 PM IST
  workflow_dispatch:         # Manual run button

jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # Necessary to push history update
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests google-auth google-auth-oauthlib google-api-python-client

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Run uploader
        env:
          SEARCH_KEYWORDS:     ${{ secrets.SEARCH_KEYWORDS }}
          CLIENT_SECRETS_JSON: ${{ secrets.CLIENT_SECRETS_JSON }}
          TOKEN_PICKLE_B64:    ${{ secrets.TOKEN_PICKLE_B64 }}
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          YT_PRIVACY:          public
          YT_CATEGORY:         "24"
          UPLOAD_OLDEST:       "false"
        run: python tiktok_to_youtube.py

      - name: Commit & Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update upload history [skip ci]"
          file_pattern: 'upload_history.txt hash_history.txt'
